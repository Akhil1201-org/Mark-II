<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mark II Bug Bounty Platform</title>
    <link rel="stylesheet" href="../complete-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-20);
            background: radial-gradient(ellipse at center, rgba(var(--color-teal-500-rgb), 0.1) 0%, transparent 50%);
        }
        
        .auth-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: var(--space-32);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--color-card-border);
            box-shadow: var(--shadow-lg);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: var(--space-32);
        }
        
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-12);
            margin-bottom: var(--space-24);
        }
        
        .auth-title {
            font-size: var(--font-size-3xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-text);
            margin-bottom: var(--space-8);
        }
        
        .auth-subtitle {
            color: var(--color-text-secondary);
            font-size: var(--font-size-md);
        }
        
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-20);
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }
        
        .form-label {
            font-weight: var(--font-weight-medium);
            color: var(--color-text);
        }
        
        .form-input {
            padding: var(--space-12) var(--space-16);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-base);
            background: var(--color-background);
            color: var(--color-text);
            font-size: var(--font-size-md);
            transition: all var(--duration-fast) var(--ease-standard);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: var(--focus-ring);
        }
        
        .form-input::placeholder {
            color: var(--color-text-secondary);
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: var(--space-8);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: var(--space-8);
        }
        
        .checkbox {
            width: var(--space-16);
            height: var(--space-16);
            accent-color: var(--color-primary);
        }
        
        .checkbox-label {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }
        
        .forgot-link {
            color: var(--color-primary);
            font-size: var(--font-size-sm);
            text-decoration: none;
            transition: color var(--duration-fast) var(--ease-standard);
        }
        
        .forgot-link:hover {
            color: var(--color-primary-hover);
        }
        
        .login-btn {
            background: var(--color-primary);
            color: var(--color-btn-primary-text);
            border: none;
            padding: var(--space-16) var(--space-24);
            border-radius: var(--radius-base);
            font-weight: var(--font-weight-semibold);
            font-size: var(--font-size-md);
            cursor: pointer;
            transition: all var(--duration-normal) var(--ease-standard);
        }
        
        .login-btn:hover {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(var(--color-teal-500-rgb), 0.4);
        }
        
        .auth-divider {
            display: flex;
            align-items: center;
            gap: var(--space-16);
            margin: var(--space-24) 0;
        }
        
        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--color-border);
        }
        
        .divider-text {
            color: var(--color-text-secondary);
            font-size: var(--font-size-sm);
        }
        
        .social-login {
            display: flex;
            flex-direction: column;
            gap: var(--space-12);
        }
        
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-12);
            padding: var(--space-12) var(--space-16);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-base);
            background: var(--color-background);
            color: var(--color-text);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
            transition: all var(--duration-fast) var(--ease-standard);
        }
        
        .social-btn:hover {
            background: var(--color-secondary);
            border-color: var(--color-primary);
        }
        
        .auth-footer {
            text-align: center;
            margin-top: var(--space-24);
            padding-top: var(--space-24);
            border-top: 1px solid var(--color-border);
        }
        
        .auth-footer-text {
            color: var(--color-text-secondary);
            font-size: var(--font-size-md);
        }
        
        .auth-footer-link {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
        }
        
        .auth-footer-link:hover {
            color: var(--color-primary-hover);
        }
        
        .back-home {
            position: fixed;
            top: var(--space-20);
            left: var(--space-20);
            display: flex;
            align-items: center;
            gap: var(--space-8);
            color: var(--color-text-secondary);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
            transition: color var(--duration-fast) var(--ease-standard);
        }
        
        .back-home:hover {
            color: var(--color-text);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-home">
        <i class="fas fa-arrow-left"></i>
        Back to Home
    </a>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="logo-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <span class="logo-text">Mark II</span>
                </div>
                <h1 class="auth-title">Welcome back</h1>
                <p class="auth-subtitle">Sign in to your account to continue hunting bugs</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="your@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <div class="form-options">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember" class="checkbox">
                        <label for="remember" class="checkbox-label">Remember me</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">Sign in</button>
            </form>

            <div class="auth-divider">
                <div class="divider-line"></div>
                <span class="divider-text">or</span>
                <div class="divider-line"></div>
            </div>

            <div class="social-login">
                <a href="#" class="social-btn">
                    <i class="fab fa-google"></i>
                    Continue with Google
                </a>
                <a href="#" class="social-btn">
                    <i class="fab fa-github"></i>
                    Continue with GitHub
                </a>
            </div>

            <div class="auth-footer">
                <p class="auth-footer-text">
                    Don't have an account? 
                    <a href="../register.html" class="auth-footer-link">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Form submission handling
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (email && password) {
                // Show success message
                showNotification('Login successful! Redirecting...', 'success');
                
                // Simulate login and redirect
                setTimeout(() => {
                    // Redirect based on email domain or user type
                    if (email.includes('company') || email.includes('corp')) {
                        window.location.href = '../dashboard/company.html';
                    } else {
                        window.location.href = '../dashboard/freelancer.html';
                    }
                }, 1500);
            }
        });

        // Notification system (reused from main script)
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.innerHTML = `
                <span>${message}</span>
                <button class="notification-close">&times;</button>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.add('notification-hide');
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 5000);
            
            notification.querySelector('.notification-close').addEventListener('click', () => {
                notification.classList.add('notification-hide');
                setTimeout(() => {
                    notification.remove();
                }, 300);
            });
        }

        // Add notification styles
        const notificationStyles = `
            .notification {
                position: fixed;
                top: 20px;
                right: 20px;
                background: rgba(220, 38, 38, 0.9);
                color: white;
                padding: 16px 20px;
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                z-index: 10000;
                animation: slideIn 0.3s ease-out;
            }
            
            .notification-success {
                background: rgba(34, 197, 94, 0.9);
            }
            
            .notification-hide {
                animation: slideOut 0.3s ease-in;
            }
            
            .notification-close {
                background: none;
                border: none;
                color: white;
                font-size: 18px;
                cursor: pointer;
                padding: 0;
            }
            
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        
        const styleSheet = document.createElement('style');
        styleSheet.textContent = notificationStyles;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>
